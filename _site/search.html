        "title": "Designing Pod-Based Global DNS for Azure Landing Zones",
        "tags": "azure-dns, private-dns, landing-zones, platform-engineering, global-dns, hub-and-spoke",
        "date": "May 26, 2026",
        "author": "",
        "category": "",
        "content": "As enterprise Azure estates grow, DNS moves from being an application configuration item to being a platform control plane. A useful namespace should express durable ownership and resolution boundaries across public services, private endpoints, hybrid networks and product landing zones.Short answerPod-based global DNS organises an enterprise DNS namespace around stable platform units such as region, pod, environment, cloud provider or product boundary. It prevents each workload from inventing names independently and gives the platform a governed model for public and private resolution across Azure, hybrid networks and product teams.The pattern makes delegation, RBAC, automation and troubleshooting align with platform operation.ProblemMany platforms begin with a few application-specific records: a public web name, perhaps a private database alias, and a small number of teams able to make DNS changes. The model becomes difficult once the estate includes multiple Azure regions, other clouds, sovereign or regulated boundaries, hub-and-spoke connectivity and broad use of Private Link.Typical symptoms appear quickly:  Names are inconsistent because every delivery team chooses a different convention.  No one can explain clearly whether a DNS record belongs to the platform, the network team or a product owner.  Public and private records are mixed without a documented split-horizon policy.  Teams create duplicate private zones for the same Azure service.  Product landing zones create unmanaged zones that do not resolve from shared or hybrid networks.  Conditional forwarding from on-premises is introduced after applications already depend on private names.  Private endpoints expose the missing DNS operating model because deployment succeeds while name resolution fails.What is a pod in platform DNS?A pod is a stable platform unit used to group namespace, connectivity and ownership. It might represent a region, country, environment, cloud-provider boundary, product platform shard, regulated or sovereign boundary, or an operational ownership boundary.A pod is not necessarily a Kubernetes pod. In this design it is an enterprise platform construct. For example, zone1 may describe a platform boundary with a defined landing-zone pattern, resolver path and operating team. It remains meaningful even when applications, clusters or subscriptions are replaced.A good pod label outlives an individual workload or deployment slot.Why DNS should follow platform boundariesDNS names should communicate stable control boundaries rather than temporary projects. Operators investigating api.app1.zone1.example.com can infer an application and a platform zone without being exposed to subscription IDs or implementation detail.Ownership should follow the same structure. A central platform team can own zone1.example.com, the pod capability and standard private endpoint zones. A delegated application team can manage approved records within its application scope through automation and limited RBAC. This gives autonomy without granting every workload the ability to build an unrelated DNS architecture.  Architecture takeaway: Design DNS around boundaries that remain stable during application change: platform, pod, product, resolution visibility and operational ownership.Public DNS delegation modelConsider a public hierarchy:example.com|-- zone1.example.com|   `-- app1.zone1.example.com|-- zone2.example.com`-- zone3.example.comexample.com is the parent domain in this example. The domain owner may keep it with its registrar or existing public DNS provider. The parent can delegate zone1.example.com to an Azure DNS public zone by publishing NS records that identify the authoritative Azure DNS name servers for the child zone. zone2 and zone3 illustrate other neutral platform or hyperscaler boundaries without exposing provider-specific naming.Azure DNS hosts authoritative public DNS zones and their records; it is not the registrar that sells or registers example.com. The platform therefore needs both ownership of the registered parent domain and a controlled process for adding delegations.Public DNS is the correct place for public endpoints, public ingress, internet-facing service discovery and domain ownership validation. For example, an intentionally public API could use:api.app1.zone1.example.com  Architecture takeaway: Use public DNS delegation for public ownership boundaries. Do not use public DNS as a substitute for Private DNS resolution.Private DNS and split-horizon modelPublic and private DNS can publish different answers for the same name or for related namespace branches. Azure Private DNS zones resolve from virtual networks linked to those zones, or from clients reaching an approved Azure resolution path. They are not internet-public DNS zones and are not delegated through public registrar NS records.This distinction matters:  Public delegation uses NS records in the public parent DNS hierarchy.  Azure Private DNS visibility uses virtual network links and resolver architecture.  Linking a private zone does not publicly delegate it.  Delegating a public child zone does not make private records resolvable from landing-zone networks.Split-horizon must be deliberate. If app1.zone1.example.com exists as both a public and a private zone, clients with access to the private zone consult the private view for that namespace. They do not automatically fall back to the public zone for a missing api record. The platform must either publish an appropriate api record in both views or place private-only records in a narrower zone such as internal.app1.zone1.example.com.Pod namespace exampleThe following model separates identity from connectivity:            Purpose      Namespace example                  Parent public domain      example.com              Neutral platform zones      zone1.example.com, zone2.example.com, zone3.example.com              Pod boundary used in this pattern      zone1.example.com              Application boundary      app1.zone1.example.com              Public application name      api.app1.zone1.example.com              Private application names      internal.app1.zone1.example.com, db.app1.zone1.example.com              Azure SQL Private Link zone      privatelink.database.windows.net              Storage blob Private Link zone      privatelink.blob.core.windows.net              Key Vault Private Link zone      privatelink.vaultcore.azure.net      Custom platform names and the Microsoft-recommended privatelink.* zones address different needs. A custom name communicates product and pod identity and can represent an internal application contract. A privatelink.* private zone enables standard Azure PaaS hostnames to resolve to private endpoint addresses for the corresponding Azure service.Do not replace the required Azure Private Link service-zone pattern with a custom alias; applications often connect using the Azure service hostname.        Public NS delegation and private resolution paths remain separate controls within a neutral pod-based namespace.  Hands-on implementation patternThis is a reference implementation, not a copy-paste production design. It shows where public zones, private zones, resolver paths and validation records fit.In this model:  example.com remains under registrar or parent DNS-provider control.  zone1.example.com is delegated to an Azure DNS public zone.  api.app1.zone1.example.com exists publicly only when the API is intentionally public.  app1.zone1.example.com is an Azure Private DNS split-horizon zone for internal client resolution.  Microsoft privatelink.* zones remain separate Azure Private DNS zones for Azure private endpoints.  Azure DNS Private Resolver provides controlled hybrid resolution paths through the connectivity hub.Step 1: Create or delegate the public platform zoneCreate the public service zone in a platform-owned resource group. Azure DNS assigns authoritative name servers when the zone is created; those assigned servers must then be added as NS records at the parent example.com provider.az group create \\  --name rg-dns-public-platform \\  --location &lt;azure-region&gt;az network dns zone create \\  --resource-group rg-dns-public-platform \\  --name zone1.example.comaz network dns record-set ns show \\  --resource-group rg-dns-public-platform \\  --zone-name zone1.example.com \\  --name @Delegate zone1.example.com using the returned Azure name servers; each created zone receives its own authoritative values.In the external parent example.com zone, the delegation looks like this:            Record name in example.com      Type      Value supplied by Azure DNS                  zone1      NS      ns1-01.azure-dns.com.              zone1      NS      ns2-01.azure-dns.net.              zone1      NS      ns3-01.azure-dns.org.              zone1      NS      ns4-01.azure-dns.info.      These name-server hostnames are illustrative only. Enter the exact four NS targets assigned to the created Azure DNS zone. Public queries below zone1.example.com are then referred to Azure DNS, while example.com remains with its existing provider.Once delegation is effective, a deliberately public application name can be published in the delegated zone. A CNAME might point to a governed public ingress hostname, for example:az network dns record-set cname set-record \\  --resource-group rg-dns-public-platform \\  --zone-name zone1.example.com \\  --record-set-name api.app1 \\  --cname ingress.zone1.example.com \\  --ttl 300Step 2: Establish the private pod/product viewFor a deliberate split-horizon design, create a private zone for the product namespace and link only networks that need its private view:az group create \\  --name rg-dns-private-zone1 \\  --location &lt;azure-region&gt;az network private-dns zone create \\  --resource-group rg-dns-private-zone1 \\  --name app1.zone1.example.comaz network private-dns link vnet create \\  --resource-group rg-dns-private-zone1 \\  --zone-name app1.zone1.example.com \\  --name link-app1-spoke \\  --virtual-network /subscriptions/&lt;subscription-id&gt;/resourceGroups/rg-net-app1/providers/Microsoft.Network/virtualNetworks/vnet-app1-spoke \\  --registration-enabled falseaz network private-dns record-set a add-record \\  --resource-group rg-dns-private-zone1 \\  --zone-name app1.zone1.example.com \\  --record-set-name internal \\  --ipv4-address 10.42.10.20Because this private zone covers the entire app1 branch, linked networks will need an intentional answer for api.app1.zone1.example.com if they must reach the public API by that name. Publish the appropriate internal-view record, or choose a narrower private zone such as internal.app1.zone1.example.com when only internal names need private resolution.Step 3: Add Private Link DNS zones separatelyPrivate endpoints for Azure PaaS services should integrate with the relevant Microsoft-recommended private zones. For example:az network private-dns zone create \\  --resource-group rg-dns-private-zone1 \\  --name privatelink.database.windows.netaz network private-dns zone create \\  --resource-group rg-dns-private-zone1 \\  --name privatelink.blob.core.windows.netaz network private-dns zone create \\  --resource-group rg-dns-private-zone1 \\  --name privatelink.vaultcore.azure.netLink these zones to the VNet that is the approved resolution point, often the connectivity hub when central resolution is used. Private endpoint deployment modules should create the endpoint and its DNS zone-group association as one supported action. A private endpoint without tested DNS resolution is not operationally complete.Step 4: Provide hub-and-spoke and hybrid resolutionIn a hub-and-spoke model, deploy Azure DNS Private Resolver in a connectivity VNet with dedicated subnets for inbound and outbound endpoints. The inbound endpoint accepts queries from connected private locations, such as enterprise DNS servers over ExpressRoute or VPN. The outbound endpoint and forwarding rulesets route selected Azure-originated queries to approved DNS services, such as an on-premises namespace.A typical operating path is:On-premises DNS  -&gt; conditional forward app1.zone1.example.com  -&gt; Private Resolver inbound endpoint in the Azure hub  -&gt; private zone linked to the hubAzure spoke  -&gt; linked forwarding ruleset or approved hub DNS path  -&gt; resolver and linked private zonesKeep resolver rules explicit. Forward the namespaces that require hybrid handling, and test both directions. If a ruleset forwards a private zone to an inbound endpoint, do not link that same rule back to the VNet containing the inbound endpoint, because that can form a DNS loop.Azure Firewall DNS Proxy in the private pod pathPublic delegation remains in public DNS; private pod namespaces and privatelink.* zones can use Azure Firewall DNS Proxy when spokes query its private IP and upstream DNS resolves zones linked to the hub or DNS platform VNet.Spoke workload  -&gt; Azure Firewall DNS Proxy  -&gt; resolvable upstream DNS  -&gt; private endpoint answerThis optional pattern can align client answers with firewall FQDN rules while avoiding a link from every zone to every spoke. In a Virtual WAN secured hub, Private DNS zones cannot link directly to the managed virtual hub, so a DNS extension VNet with a resolver or forwarder may be necessary.  Architecture takeaway: Azure Firewall DNS Proxy can reduce Private DNS zone link sprawl by making spokes use a central DNS path, but only when the firewall’s upstream resolver can actually resolve the linked Private DNS zones.Step 5: Publish public validation records when a service requires themAn application can be reachable privately while still requiring public proof that the organization controls a custom domain. Azure App Service custom-domain mapping is a useful example: validation is performed through public DNS, not an Azure Private DNS zone.For an App Service subdomain such as api.app1.zone1.example.com, the service may require:CNAME  api.app1  &lt;app-service-default-hostname&gt;TXT    asuid.api.app1  &lt;domain-verification-id&gt;For an apex mapping, the pattern uses an A record and an asuid TXT record. The exact record values come from the Azure resource configuration. Publish only the public records required for the intended public binding or verification; an asuid TXT record proves domain control and does not create private network reachability.This separation is important for platform governance: public DNS owners approve externally visible verification and ingress records, while private DNS owners govern internal service discovery and private endpoint resolution.Step 6: Apply ownership, RBAC and operational testsThe platform team should own parent delegations, shared public zones, resolver architecture and approved privatelink.* zones. A product team can receive narrowly scoped permissions or an automated workflow to manage approved records within its product boundary. Avoid broad DNS Zone Contributor access across every pod when a smaller scope or deployment module is sufficient.For each pod onboarding, test:  Public NS delegation and public API resolution from an external resolver.  Internal name resolution from the intended spoke VNet.  Public-name behaviour from a VNet affected by split-horizon DNS.  Azure PaaS hostname resolution to the expected private endpoint address.  Conditional forwarding from a permitted hybrid client.  Failure handling, record ownership metadata and removal of stale endpoints.Platform operating modelA namespace only remains governed when its delivery model is clear:  The enterprise domain owner governs parent public-domain registration and delegation approval.  The platform team defines pod naming, Azure DNS zones, Private Resolver deployment, Private Link zone patterns, RBAC and automation modules.  Product teams request namespaces and endpoints through supported interfaces and validate application behaviour.  Network operations own monitored resolver paths and hybrid forwarding runbooks.  Security and governance functions review public exposure, privileged DNS changes and regulated-boundary exceptions.Infrastructure as code should encode zones, links, endpoints, rules and role assignments, including pod ownership and permitted public names.Common failure modes  Treating a pod label as a short-lived project name rather than a stable platform boundary.  Creating public subdomains without documented delegation and ownership.  Assuming an Azure Private DNS zone is delegated through internet DNS.  Linking a private split-horizon zone and accidentally hiding a required public name.  Replacing privatelink.* service zones with custom aliases without completing the Azure PaaS resolution path.  Allowing each product subscription to create duplicate Private Link zones.  Adding private endpoints without DNS zone-group and resolver-path testing.  Building hybrid forwarding late, after products already depend on private resolution.  Giving broad DNS administrative roles where pod- or workflow-scoped rights are sufficient.  Publishing internal topology in public DNS when only validation or public ingress records are needed.Architecture checklist  The global namespace uses stable cloud, pod and product boundaries.  Parent public-zone ownership and NS delegation processes are documented.  Public application records exist only for intentionally public services or required validation.  Split-horizon zones define how public names behave from linked private networks.  Private DNS zone links and Private Resolver paths are designed together.  Microsoft-recommended privatelink.* zones are used for Azure PaaS private endpoints.  Hub-and-spoke and hybrid queries are tested through approved resolver paths.  RBAC, infrastructure as code and product onboarding reflect DNS ownership boundaries.  Public TXT or CNAME/A verification records are managed as public-domain controls.  Monitoring and runbooks cover resolution, endpoint lifecycle and recovery.Further reading  Azure DNS delegation overview  Host and delegate a domain in Azure DNS  Azure Private DNS overview  Azure Private DNS virtual network links  Azure DNS Private Resolver endpoints and rulesets  Azure DNS Private Resolver overview  Azure Firewall DNS settings  Azure Private Endpoint DNS configuration  Azure App Service custom domain mappingRelated architecture notes  Private DNS at Scale in Azure Landing Zones  Designing Azure Landing Zones for Product Teams  Azure NetworkingSummaryPod-based global DNS gives Azure landing zones a namespace model that supports both scale and accountability. Public delegation exposes only intended public ownership and services; Private DNS, Private Link zones and Azure DNS Private Resolver deliver controlled private resolution across spokes and hybrid networks. With deliberate split-horizon rules, scoped RBAC and automated onboarding, DNS becomes a reliable platform capability rather than a set of workload exceptions.",

      "azure-networking-2026-05-25-private-dns-at-scale-in-azure-landing-zones-html": {
        "title": "Private DNS at Scale in Azure Landing Zones",
        "tags": "Azure, Private DNS, Private Endpoints, Azure Landing Zones, Networking",
        "date": "May 25, 2026",
        "author": "",
        "category": "",
        "content": "Private endpoints are straightforward to demonstrate in one virtual network. Across many subscriptions, products, environments and connected networks, private DNS becomes one of the most important shared services in an Azure platform.Short answerPrivate DNS at Azure landing-zone scale is a shared platform capability that ensures private endpoint names resolve consistently from workload, hub and hybrid networks through centrally governed zones and resolution paths.Architecture decisionCentralise ownership of approved Azure Private DNS zones and resolver patterns, while enabling product teams to provision supported private endpoints through automated platform interfaces.When to use this patternUse this pattern when private endpoints span multiple subscriptions or virtual networks, when hybrid systems must resolve Azure private services, or when consistent private connectivity is required for regulated workloads.Why Private DNS Becomes Hard at ScaleWhen an Azure service receives a private endpoint, applications still normally address the service using its familiar service hostname. DNS must guide that name to the private endpoint address from approved networks. In a small proof of concept, linking one private DNS zone to one virtual network can appear sufficient. In an enterprise platform, that approach quickly encounters ownership, duplication, hybrid resolution and lifecycle problems.Product teams may create endpoints for storage, Key Vault, databases, container registries and other services in separate subscriptions. Environments may require isolation. On-premises systems may need to reach selected private services. Central networking teams need to understand the resulting paths without manually administering every application deployment.Private DNS is therefore not just a network configuration detail. It is a platform capability that influences security boundaries, reliability and product-team autonomy.  Architecture takeaway: Private DNS must be designed as a shared platform service once workloads consume private endpoints across subscriptions and networks.Private Endpoints and Split-Horizon DNSA private endpoint maps an Azure service into a virtual network using a private IP address. Public DNS for the service continues to exist, while the private resolution path should return the endpoint address for clients that are intended to reach it privately. This is a split-horizon DNS problem: the correct answer depends on where the query originates and what access path is approved.If name resolution is incorrect, clients may fail to connect, attempt a public path that policy prohibits, or reach the wrong endpoint arrangement. These failures are often misdiagnosed as firewall or application issues.A platform design should treat endpoint provisioning and DNS registration as one capability. Creating a private endpoint without the intended resolution path is not a completed deployment.Centralised Private DNS ZonesIn a multi-subscription estate, Azure Private DNS zones are usually best owned centrally in a connectivity or shared-services subscription. Central ownership reduces duplicated zones, inconsistent records and uncertainty over which virtual networks are linked to which resolution source.The platform can establish zones for approved Azure Private Link services and control zone links to the networks that require them. Product automation creates private endpoints and associates them with the supported central DNS pattern rather than creating arbitrary local zones.Centralisation does not mean that the networking team must manually approve every routine endpoint. Terraform modules or deployment workflows can expose supported endpoint types and register them consistently. The division is useful: the platform owns resolution architecture, while the product owns its service instance and justified connectivity request.  Architecture takeaway: Central ownership should be paired with automation, so consistent resolution does not become a manual delivery bottleneck.Environment separation requires deliberate thought. Some organizations use common central zones across environments where access and routing already provide adequate separation; others require stronger isolation. The decision should follow security and operational requirements rather than happen accidentally through portal defaults.Private DNS Zone ShardingCentral ownership does not always require one flat zone shared across every product and environment. Private DNS zone sharding is an architecture pattern, not an Azure feature toggle: the platform deliberately establishes smaller resolution boundaries based on product or team ownership, environment, lifecycle, region, service type or workload class.        Private DNS zone sharding keeps central DNS governance while reducing change blast radius through selective virtual network links and ownership-based DNS boundaries.  Sharded zones are isolated by default, so cross-zone and hybrid resolution must be designed explicitly. Azure DNS Private Resolver supports hub-and-spoke and hybrid paths across approved DNS boundaries, while selective virtual network links limit which workloads consume each shard. Linking every spoke to every zone removes much of the operational isolation that sharding is intended to provide.The same boundary should be reflected in Azure role-based access control (RBAC) and Azure Policy: teams should manage only the DNS scope they own, while platform governance retains central oversight. Avoid both extremes: one large flat zone for unrelated products and a proliferation of shards for short-lived workloads without a durable operational reason.This pattern can improve operational resiliency and change safety by containing the impact of record or link changes. It does not change the underlying availability commitment of the Azure DNS service.  Architecture takeaway: Use sharding when DNS ownership, change blast radius or environment isolation becomes more important than the simplicity of a single flat private DNS zone.Hub-and-Spoke ConsiderationsHub-and-spoke landing zones frequently place shared DNS capability in, or reachable from, the hub while workloads deploy in spoke virtual networks. DNS resolution must function from spokes and from any hybrid-connected network permitted to access services.Virtual network links, routing, DNS server settings and firewall behavior need consistent design. A workload spoke should not need its own ad hoc DNS server simply because a private endpoint was created. Equally, central DNS services need sufficient availability and monitoring because a resolution outage can affect many products at once.When workloads are segmented or have different regulatory boundaries, link and forwarding design should reflect those boundaries. Central service does not justify unnecessary cross-workload reachability.Centralised Private DNS with Azure Firewall DNS ProxyIn a classic hub-and-spoke landing zone, Azure Firewall DNS Proxy can be one central resolution path for spokes. A workload uses the firewall private IP as its DNS server; the firewall then forwards the query to an upstream DNS server that can resolve the centrally governed Private DNS zones.Spoke VM / workload  -&gt; DNS query to Azure Firewall private IP  -&gt; Azure Firewall DNS Proxy  -&gt; upstream DNS with access to linked Private DNS zones  -&gt; private A record / Private Endpoint IPThis can reduce the need to link every Private DNS zone to every spoke VNet, and it can keep the DNS answer used by clients aligned with DNS observed by firewall FQDN rules. The pattern is optional: the upstream DNS must resolve the required zones, and the spoke workloads must actually use the firewall proxy. DNS Proxy forwards queries; it does not make unlinked or unreachable private zones resolvable by itself.For Azure Virtual WAN secured hubs, Private DNS zones cannot be linked directly to the Microsoft-managed virtual hub. A DNS extension VNet using Azure DNS Private Resolver or an approved forwarder pattern may be required. As with any central DNS dependency, availability, logging and operational ownership need explicit design.  Architecture takeaway: Azure Firewall DNS Proxy can reduce Private DNS zone link sprawl by making spokes use a central DNS path, but only when the firewall’s upstream resolver can actually resolve the linked Private DNS zones.Azure DNS Private ResolverAzure DNS Private Resolver provides managed inbound and outbound endpoints and forwarding rulesets for hybrid name-resolution patterns, reducing the need to operate custom DNS forwarder virtual machines for many scenarios.An inbound endpoint enables connected networks to send DNS queries into Azure for names that Azure can resolve, including private zones exposed through the intended design. An outbound endpoint and forwarding rulesets allow Azure workloads to resolve specified domains through destinations such as enterprise DNS services.The resolver belongs in the connectivity architecture: subnets, regional resilience, routing, forwarding rules, diagnostic needs and ownership must be planned. It is not merely a convenience feature added individually by each workload team.  Architecture takeaway: Name resolution is an operational dependency; resolver resilience, monitoring and ownership belong in architecture decisions.Conditional Forwarding from On-PremisesHybrid applications often require on-premises clients or servers to reach Azure services through private endpoints. Enterprise DNS servers can conditionally forward the appropriate Azure private-resolution queries toward Azure DNS Private Resolver inbound endpoints or another approved Azure resolution path.The exact forwarding model must be documented and tested. Overly broad forwarding can create unexpected dependency or resolution behavior; incomplete forwarding creates intermittent failures depending on where clients operate. Include disaster recovery and secondary-region behavior in the design rather than addressing it only during an outage.Operational troubleshooting should allow support teams to answer: which DNS server responded, which zone or rule applied, which private IP was returned and whether that IP is reachable from the requesting network.Product and Platform Ownership ModelClear responsibility avoids both uncontrolled sprawl and slow manual delivery:  The platform team owns DNS architecture, approved private endpoint patterns, central zones, resolver capability, forwarding policy and monitoring.  Product teams own their services, data-access decisions, endpoint requests and validation of application connectivity.  Security and governance teams define public-access restrictions, evidence expectations and exception review.  Operations teams need runbooks for DNS resolution failures, endpoint lifecycle and regional recovery.This model can be implemented through a documented module catalogue. A module request may include service type, environment, spoke network, DNS association and ownership metadata, then deploy the endpoint according to the approved platform pattern.Common failure modesFrequent causes of trouble include:  Product subscriptions creating duplicate private DNS zones for the same Azure service.  Large flat zones shared by too many products, making routine DNS changes unnecessarily risky.  Over-sharding zones for short-lived workloads, creating avoidable operational overhead.  Linking too many virtual networks to too many zones, recreating a wide change blast radius.  Sharded zones without a documented cross-zone or hybrid resolution path.  RBAC that does not match the intended ownership boundary of each DNS shard.  Missing virtual-network links, causing Azure-hosted clients to receive public answers or no useful answer.  On-premises DNS without the required conditional forwarders.  Private endpoint creation separated from DNS record lifecycle.  Stale records after endpoints are replaced or deleted.  DNS designs that do not account for disaster recovery or regional failure.  Troubleshooting processes that check firewall rules without confirming resolution first.These failure modes are preventable when private DNS is treated as shared platform engineering.Governance and NamingGovernance should define which Azure services are expected to use private access, who can create endpoint resources, how public network access is constrained and how DNS associations are made. Azure Policy and infrastructure as code can help prevent unsupported patterns and collect compliance evidence.Naming and metadata make operations easier. Endpoint resources, associated network interfaces and requests should identify product, environment, region, service owner and support contact where standards allow. DNS zones themselves usually follow Azure service conventions, so management metadata and deployment records are essential context.Diagnostics should be included for resolver components and relevant networking controls. Review DNS patterns when introducing a new Private Link service type, a new region or a new hybrid-connectivity route.Architecture checklist  Private endpoint and DNS provisioning are delivered as one supported pattern.  The design explicitly states whether Private DNS zones are flat, centralised or sharded.  Sharding boundaries are based on ownership, environment, region, service type or lifecycle.  RBAC and Azure Policy match the intended DNS ownership model.  Virtual network links are selective and do not recreate a broad blast radius.  Azure DNS Private Resolver is considered for cross-zone, hub-and-spoke or hybrid resolution.  Zone size and record growth are monitored as operational signals.  Central zone ownership and subscription placement are defined.  Spoke network resolution and segmentation requirements are documented.  Hybrid conditional forwarding has been tested from intended source networks.  Azure DNS Private Resolver architecture includes resilience and ownership.  Public access restrictions align with private-resolution expectations.  Automation controls record creation and cleanup.  Monitoring and troubleshooting runbooks include DNS-first verification.  Recovery-region and regulated-boundary considerations are explicit.Further reading  Azure Networking  Azure Landing Zones  Azure DNS Private Resolver documentation  Azure Firewall DNS settings  Sharding private DNS zones - Azure DNSRelated architecture notes  Designing Azure Landing Zones for Product Teams  Infrastructure as Code  Sovereign CloudSummaryPrivate DNS at scale is a foundational Azure landing-zone capability. Central zones, governed private endpoint integration, managed resolution paths and clear product/platform ownership allow enterprises to use private Azure services consistently without turning every connection into a bespoke network project. When DNS is designed as part of the platform, secure connectivity becomes more reliable, observable and easier for product teams to consume.",
        "url": "//azure/networking/2026/05/25/private-dns-at-scale-in-azure-landing-zones.html"
      }

      "azure-landing-zones-2026-05-25-designing-azure-landing-zones-for-product-teams-html": {
        "title": "Designing Azure Landing Zones for Product Teams",
        "tags": "Azure, Azure Landing Zones, Platform Engineering, Governance, Terraform",
        "date": "May 25, 2026",
        "author": "",
        "category": "",
        "content": "Azure product teams need a platform that removes repeated foundation decisions without removing accountability. An Azure landing zone should make secure delivery the normal path, not become a central queue for every subscription, network or policy change.Short answerAzure Landing Zones for product teams are governed platform foundations that standardise subscriptions, connectivity, identity, policy and observability while giving application teams a clear, automated route to deploy and operate their workloads.Architecture decisionTreat the landing zone as a versioned platform product owned around shared controls and supported patterns, while product teams retain responsibility for workload-specific architecture and operation.When to use this patternUse this pattern when multiple products or environments require consistent Azure controls, when private connectivity and identity governance must scale beyond one project, or when regulated workloads require traceable policy and operational evidence.Problem StatementEnterprises rarely struggle to create a single Azure subscription. The harder problem is providing a repeatable environment for many products, stages and teams while retaining confidence in identity, connectivity, policy, monitoring, cost and regulatory boundaries.Without a platform approach, projects make local decisions: one chooses its own private DNS arrangement, another assigns broad roles to a pipeline, and a third discovers logging or disaster recovery only before go-live. Those differences increase delivery effort and operational risk.An Azure landing zone is the set of foundational decisions and automated capabilities that product teams consume. It should be opinionated where shared security and operations require consistency, and flexible where workload requirements genuinely differ.  Architecture takeaway: A landing zone is a consumed platform capability, not only an initial subscription and network deployment.Platform Versus Project MindsetA project mindset builds foundations for a delivery milestone. A platform mindset creates a supported product that must serve multiple workloads over time. The distinction affects priorities:  Reusable capability matters more than a one-off portal configuration.  Clear consumer interfaces matter as much as the underlying Azure resource graph.  Versioning, operational ownership and upgrade paths matter after initial deployment.  Exceptions are design inputs to evaluate, not quiet divergence from standards.The platform team does not need to own every application resource. It should own the shared rules and building blocks that let application teams take appropriate responsibility for workloads.Management Group and Subscription DesignManagement groups provide a policy and access-assignment hierarchy. They should be designed around control requirements rather than copying an organizational chart that changes frequently. A common pattern distinguishes platform capabilities from workload landing zones and separates production from non-production or regulated scopes where the control baseline materially differs.Subscriptions are useful boundaries for policy, access, quotas, billing visibility and blast radius. A product may receive distinct subscriptions for production and non-production, with additional boundaries where data sensitivity, connectivity or regulatory requirements demand them.Subscription design should answer:  Who owns workload cost and operational response?  Which baseline policies apply?  Which deployment identities may create resources?  Which networks and regions are available?  How does a product transition from experimentation to production support?Over-fragmentation adds administration, while under-separation makes authorization and evidence difficult. The appropriate balance follows workload ownership and risk.Subscription VendingSubscription vending converts architecture standards into an onboarding workflow. A request should capture product identity, environment, owner, support contact, data classification, connectivity need, region and budget information. Automation can then place the subscription in the correct management group and attach the platform baseline.A vended subscription might receive:  Naming and tagging baseline.  Role assignments for approved product and deployment groups.  Budget and ownership information.  Diagnostic settings and security integration.  Network onboarding or documented connectivity choices.  Policy assignments inherited through the intended scope.This process gives product teams a usable starting point and gives platform owners an auditable record of why an environment exists.  Architecture takeaway: Subscription vending should establish ownership, controls and operational visibility at the moment a team receives its environment.Network and DNS BaselineNetworking is where landing zones often succeed or fail in daily use. Product teams require predictable options for inbound access, outbound dependencies, hybrid connectivity and private Azure services. Hub-and-spoke or Azure Virtual WAN can provide shared connectivity and inspection, but the selected model must be supported with routing ownership and monitoring.Private endpoints make private DNS a platform concern. If every team creates private DNS zones independently, resolution becomes unreliable across spokes and connected on-premises networks. A landing zone should define central private DNS zone ownership, zone-link behavior, Azure DNS Private Resolver or forwarding arrangements where needed, and automation for supported private endpoint types.The baseline should be documented in consumer terms: how a product requests connectivity, what is centrally managed, which traffic is inspected and how incidents are diagnosed.  Architecture takeaway: Private endpoint adoption makes DNS design and lifecycle automation part of the landing-zone product.Identity and Role Assignment ModelHuman and workload identities should be designed separately. Teams can receive access through Microsoft Entra ID groups with defined ownership and review. Privileged platform administration should be limited, monitored and eligible through controlled workflows where appropriate.Deployment pipelines should use governed identities with only the permissions required for their deployment boundary. Avoid embedding long-lived secrets in product workflows where managed identities or workload identity federation provide a better control.The landing zone also needs emergency access, role-change processes and an evidence path for audits or incidents. Least privilege is not a slogan; it is a maintained relationship between team responsibility and permitted action.Azure Policy BaselineAzure Policy turns selected standards into enforceable or measurable platform behavior. A baseline may require diagnostic settings, constrain locations, restrict insecure exposure, deploy supporting agents or report non-compliance. Policy should be treated as code: versioned, reviewed, tested, deployed progressively and associated with an exception process.Do not begin with the maximum possible number of deny policies. A landing zone needs a baseline that prevents unacceptable outcomes while giving teams clear remediation. Audit and deploy-if-not-exists effects can establish visibility and configuration; deny effects should be intentional and understood by consumers.Regulated workload scopes may add approved-service lists, restricted regions or more stringent connectivity requirements. Those additions should be traceable to a control need.Observability and Security OperationsA subscription is not production-ready merely because deployment succeeds. Logs and platform metrics need defined destinations, retention and ownership. Security findings need operational routing. The platform should provide monitoring integration and product teams should understand which alerts they own.Useful platform-level signals include policy compliance, subscription inventory, role assignment changes, network and firewall diagnostics, Defender recommendations, deployment failures and cost anomalies. Incident investigation is faster when those signals are consistent across products.For sovereign or sensitive workloads, evidence collection and log data residency also require architecture review.Product Team OnboardingOnboarding should include documentation, sample deployment code and a small number of decisions the product team genuinely owns. A team needs to know:  How to obtain subscriptions and deployment identities.  How to consume network, DNS and private endpoint patterns.  Which policies are applied and how to remediate or request an exception.  Where logs, cost and security findings are visible.  How platform changes and module versions are communicated.Platform support should observe repeated questions and use them to improve documentation, modules or automation rather than accepting permanent manual intervention.Common failure modesCommon landing-zone failures include designing only for one initial workload, using management groups as a static organization chart, allowing uncontrolled private DNS creation, assigning excessive rights to deployment identities, applying policies without consumer guidance and treating operational monitoring as a later project phase.Another mistake is presenting governance and developer experience as opposites. A well-designed platform creates fast, safe paths for standard delivery and a clear process for assessed exceptions.Architecture checklist  Control requirements and workload classifications are understood.  Management group scopes and subscription boundaries have clear purposes.  Subscription vending attaches ownership, access, monitoring and policy consistently.  Network, private endpoint and DNS patterns are documented and automated.  Human and deployment identities follow least privilege.  Policy is versioned, tested and linked to exception handling.  Observability and security response have owners.  Product onboarding is usable and measurable.  Regulated requirements include evidence and recovery design.Further reading  Azure Landing Zones  Infrastructure as Code  Azure NetworkingRelated architecture notes  Private DNS at Scale in Azure Landing Zones  Identity &amp; Security  Platform EngineeringSummaryAzure landing zones for product teams should be delivered as a platform product: a governed, automated foundation that reduces repeated architecture decisions and improves evidence, security and operational consistency. The best landing zone allows teams to focus on their product while knowing that identity, networking, policy and visibility are intentionally designed around them.",
        "url": "//azure/landing-zones/2026/05/25/designing-azure-landing-zones-for-product-teams.html"
      }
      ,
    
      "azure-automation-2023-03-26-ansible-html": {
        "title": "Configuring Infrastructure using Ansible",
        "tags": "Azure, Terraform, Ansible, Automation",
        "date": "March 26, 2023",
        "author": "",
        "category": "",
        "content": "Recently, I invested a lot of time into writing Terraform code to deploy a fairly complex infrastructure in Azure, which included a Virtual WAN, Firewall, Azure Front Door, and multiple virtual networks in two different regions, along with some VMs. While this was a time-consuming task, once all the Terraform modules were completed and working, I could deploy the entire infrastructure in almost no time and easily undeploy it once I was finished with my testing.However, I still needed to configure web servers, failover clusters for SQL Always On groups, and other elements. To accomplish this, I decided to explore Ansible.Ansible is an open-source automation tool that allows IT professionals to automate tasks like configuration management, application deployment, and task automation. Ansible uses a simple, human-readable language called YAML to define tasks and configurations, and it can be easily integrated into existing workflows and toolchains.In my current setup, I installed Ansible on my PC using WSL (Windows Subsystem for Linux) and Ubuntu. WSL is a compatibility layer in Windows that enables running Linux binaries natively on Windows. It provides a Linux-compatible kernel interface that allows Linux binaries to run on Windows without the need for a traditional virtual machine.Installing Ansible on WSL and Ubuntu is fairly straightforward.After installing Ansible, I created a project folder and an inventory.txt file inside the project folder using the commandsudo vi inventory.txtIn the inventory.txt file, I added the hosts that I wanted to deploy my configuration, one is a VM running on my PC and one is a VM deployed in Azure with my Terraform code.I divided the servers into two groups: [Window] and [azure]. You can add as many servers as you want to each of the groups.The next step was to configure a variable for each VM to allow communication between Ansible and Windows OS. It’s essential to remember that winrm must be configured on the Windows VM. You can run a PowerShell script to configure listeners and generate a self-signed certificate required for authentication. The PowerShell script can be found hereFor Azure VMs, I also had to configure NSGs and a Firewall to allow communication from my home PC on port 5986 used by Ansible.Now, let’s create a playbook. An Ansible playbook is a collection of tasks that are executed against a set of hosts defined in an inventory file. Playbooks are written in YAML format and define the desired state of the hosts. Playbooks can be used for a wide range of automation tasks, including configuration management, application deployment, and task automation.A playbook consists of one or more plays, and each play consists of a set of tasks to be executed on the hosts. Tasks are executed in order, and each task defines a module to be run on the host and the parameters for that module.In my playbook, I do a few things:  create a folder _tmp  create a demo.txt file inside a folder that was created in the previous file  copy PowerShell script that will create new failover cluster with a single node  install Windows Security Updates  install IIS on both VMs  install Failover Cluster feature  install Failover Cluster Management ToolsHere is my playbook file pingtest.yamlOkay, now that we have everything configured, let’s run the playbook and see the end result. To execute a playbook, we run the below command: ansible-playbook pingtest.yaml -i inventory.txtEverything worked as expected (it didn’t straight away and it took me a good few hours to sort everything out 😂).Next, verify the IIS deployment:As you can see, IIS has been successfully installed. What about Failover Cluster roles? Here they are too, with files and folders as well :)SummaryThis example used Terraform to provision Azure infrastructure and Ansible to configure Windows server roles after deployment. The combination is useful when responsibilities are clear: Terraform owns cloud resource state, while configuration automation manages operating-system configuration in a controlled, repeatable way.Before production use, protect inventory secrets, restrict WinRM exposure, use appropriate authentication and certificate practices, test idempotency and include patching and rollback in the operating model. Automation is most valuable when it reduces drift and leaves a reviewable record of platform changes.",
        "url": "//azure/automation/2023/03/26/Ansible.html"
      }
      ,
    
      "power-platform-2023-03-25-tuckshop-html": {
        "title": "Building Tuck Shop application using Microsoft Power Apps",
        "tags": "Microsoft, Power Apps, SharePoint, Teams",
        "date": "March 25, 2023",
        "author": "",
        "category": "",
        "content": "Microsoft Power Apps is a powerful low-code platform that allows users to create custom business applications with ease. Even if you have no experience in app development, Power Apps provides an intuitive interface that makes it easy to create fully functional applications quickly.Recently, I had the opportunity to explore Power Apps and was amazed by its capabilities. One of the internal projects I worked on was creating a Tuck Shop app, which proved to be a fun and rewarding experience.The Tuck Shop app was designed to simplify the process of ordering snacks and drinks at HTG’s canteen. With Power Apps, I was able to create a user-friendly interface that allowed colleagues to scan the barcode of the items they wanted to purchase, view their total cost and purchase history, confirm whether an item was already paid for, and submit an order with just a few clicks.Power Apps made it easy to integrate the app with other Microsoft services such as SharePoint and Microsoft Teams. This meant that the app could be accessed by anyone with the right permissions, making it an ideal solution for managing purchases in the HTG Tuck Shop.Overall, my experience with Power Apps was extremely positive. Its low-code platform allowed me to create a fully functional application without the need for extensive coding knowledge, and its seamless integration with other Microsoft services made it a versatile and efficient solution for the Tuck Shop project.If you are looking for a powerful and user-friendly platform for creating custom business applications, Microsoft Power Apps is worth exploring. Its low-code approach, coupled with integration with other Microsoft services, makes it a useful tool for application development.SummaryThis small application demonstrated how Power Apps, SharePoint and Teams can support a practical internal workflow with minimal custom development. For a production business application, the next architecture questions would include data ownership, access groups, audit requirements, environment strategy, support and application lifecycle governance.",
        "url": "//power platform/2023/03/25/TuckShop.html"
      }
      ,
    
      "azure-virtual-desktop-2021-06-24-avdresethostpoolcount-html": {
        "title": "How to reset AVD Host Pool Counter",
        "tags": "Azure, Azure Virtual Desktop, Automation",
        "date": "June 24, 2021",
        "author": "",
        "category": "",
        "content": "This note shows how the starting virtual-machine number was adjusted when adding session hosts to an Azure Virtual Desktop host pool without removing existing hosts.  Updated note (2026): Shared Image Gallery (SIG) is now Azure Compute Gallery. Confirm current Azure Virtual Desktop session host deployment options before following this historical portal workflow.This is a quick post related to the Azure Virtual Desktop Host Pool update process. Microsoft recommends rebuilding the session host from the latest, fully patched image stored in Azure Compute Gallery (formerly Shared Image Gallery). This is an overall smooth and easy process; however, the issue I had was around the host prefix counter. Every new host added to the pool gets an incremental number unless you delete all the session hosts from the pool.In my case, I didn’t want to delete the host in case I need to roll back and a customer wanted the host numbers to start from 0-10. The solution to this is pretty simple, modify the ARM Template before hitting Create button.Follow the normal process of adding a new host to the host pool but at the very last step, instead of clicking Create, click on Download a template for automation  Now select Parameters  now look for vmInitialNumber  Change the value from 1, in my case, to 0 or any other number that you want to start VM numbers from.  Now click Deploy.SummaryChanging vmInitialNumber allowed an AVD session-host deployment to start at the required naming sequence while preserving existing hosts for rollback. The portal and deployment templates can change over time, so confirm the current session-host registration workflow and securely handle registration tokens before applying this approach in production.For an enterprise platform, naming conventions should be predictable, but host replacement and rollback safety are more important than cosmetic numbering. Automating the host lifecycle through reviewed templates or infrastructure as code provides a more dependable long-term pattern.",
        "url": "//azure/virtual desktop/2021/06/24/AVDResetHostpoolCount.html"
      }
      ,
    
      "azure-virtual-desktop-2021-06-07-wvdrebrandingavd-html": {
        "title": "Windows Virtual Desktop became Azure Virtual Desktop",
        "tags": "Azure, Azure Virtual Desktop, Microsoft Entra ID",
        "date": "June 7, 2021",
        "author": "",
        "category": "",
        "content": "In June 2021, Microsoft renamed Windows Virtual Desktop to Azure Virtual Desktop (AVD).  Updated note (2026): Azure Virtual Desktop (AVD) is the current product name. Azure Active Directory referenced in this historical announcement is now Microsoft Entra ID.Microsoft announced in June 2021 that Windows Virtual Desktop (WVD) would be rebranded as Azure Virtual Desktop (AVD).The rebrand reflected Microsoft’s broader positioning of the service as a cloud VDI and application-delivery platform for hybrid work. For enterprise architecture, the meaningful point was not simply the product name: AVD became an increasingly important platform workload requiring secure identity integration, scalable host management, profile storage, endpoint controls and monitoring.At announcement time, Microsoft also described new capabilities and pricing options for remote application streaming.Some of the capabilities discussed in that historical announcement included:Enhanced Support for Microsoft Entra ID  Microsoft Entra ID, then named Azure Active Directory, is a critical service used by organizations to manage user access to important apps and data and maintain strong security controls. At announcement time, Microsoft also described support for joining Azure Virtual Desktop virtual machines directly to that identity service.Multi-Session Management  Microsoft Endpoint Manager allows you to manage policies and distribute applications across devices.Microsoft’s original announcement is available in Azure Virtual Desktop: The desktop and app virtualization platform for the hybrid workplace.SummaryAzure Virtual Desktop is now the established product name. For new deployments, focus on current AVD documentation and design the service as part of a governed Azure platform: identity, network paths, image management, user profiles, monitoring and operational ownership should be explicit from the start.",
        "url": "//azure/virtual desktop/2021/06/07/WVDRebrandingAVD.html"
      }
      ,
    
      "azure-identity-2021-06-06-wvdfido2-html": {
        "title": "Secure access to Azure Virtual Desktop with FIDO2 security keys",
        "tags": "Azure, Azure Virtual Desktop, Microsoft Entra ID, FIDO2",
        "date": "June 6, 2021",
        "author": "",
        "category": "",
        "content": "Did you know that Microsoft supports FIDO2 security keys in Microsoft Entra ID (formerly Azure Active Directory)?  Updated note (2026): Windows Virtual Desktop is now Azure Virtual Desktop (AVD), and Azure Active Directory is now Microsoft Entra ID. Screenshots retain the names shown when this article was published.Since Azure Virtual Desktop (formerly Windows Virtual Desktop) uses Microsoft Entra ID for authentication, FIDO2 security keys can also be used to secure applications and desktops hosted on Azure Virtual Desktop.In this post, I will demonstrate how to enable FIDO2 support in Microsoft Entra ID for AVD.First of all, we need to enable FIDO2 support in Microsoft Entra ID.Log in to the Azure portal and then navigate to Microsoft Entra ID Authentication methods.Under Policies blade, select FIDO2. Now under 1) Enable, click on Yes, next under 2) Target select All users or specific pilot group or individual user. In my demo, I will only target one user. Now under 3) General, Allow self-service setup, this will allow users to register their security keysNow as the Azure part is already configured, we can log in to the Office.com portal and register our security key. Once you are logged in, click on your initials in the top right corner and select View AccountNow click on Security Info on the left-hand side, or in the middle of the screenNow you should see currently allowed authentication methods. Click Add a method and choose Security Key from the drop-down menuSelect the correct device type you are using. For this demo I used USB Yubikey hence I selected USB DeviceOk, now it’s time to plug the key into the USB port and start the registrationSelect PIN for your keyTouch your security key to finish registrationThat is the key now registered with my test account and ready to use. Let us try it with Azure Virtual Desktop.Launch Microsoft Remote Desktop client and hit subscribe. On the Microsoft signing page, click on Sign-in options. You should now see the below options, click on Sign in with Windows Hello or a security keyNow, type in the PIN that we set up earlier on for our keyTouch the keyAnd we are in!The same process applies when accessing AVD via the web client.SummaryFIDO2 security keys provide a phishing-resistant authentication option for Azure Virtual Desktop access through Microsoft Entra ID. Before using this approach in production, validate supported clients, authentication-method policy scope, Conditional Access requirements, recovery processes and service-desk support for lost or replaced keys.The architecture takeaway is that a virtual desktop platform is only as secure as its access path: strong user authentication should be designed alongside session controls, application authorization and operational monitoring.",
        "url": "//azure/identity/2021/06/06/WVDFIDO2.html"
      }
      ,
    
      "azure-identity-2021-06-05-continuosaccessevaluation-html": {
        "title": "Enable Continuous Access Evaluation in Microsoft Entra ID",
        "tags": "Azure, Microsoft Entra ID, Continuous Access Evaluation, Conditional Access",
        "date": "June 5, 2021",
        "author": "",
        "category": "",
        "content": "Continuous Access Evaluation (CAE) helps supported applications respond quickly to critical identity and access events in Microsoft Entra ID, rather than waiting for an access token to expire.  Updated note (2026): Azure Active Directory is now Microsoft Entra ID. This article originally described a preview-era activation flow; CAE is now a current capability with behavior and support requirements documented by Microsoft. Use the current Microsoft Learn guidance when designing or troubleshooting deployments.Why Token Lifetime Is Not EnoughCloud applications commonly authorize a session using an access token. A token is valid for a period and avoids authentication on every request. That model creates an important security question: what happens when a user’s risk or authorization changes while the token remains valid?Consider an employee account that is disabled, a password reset following suspected compromise, a user moved away from a trusted location, or an administrator revoking sessions. Waiting until an existing token naturally expires can leave access available for longer than the business risk allows.Security architecture should therefore distinguish between initial authentication and continuous enforcement. Strong authentication reduces the likelihood of unauthorized sign-in. Conditional Access determines whether access should be permitted under evaluated conditions. CAE helps supported applications learn about certain changes and enforce them sooner during an existing session.What Continuous Access Evaluation DoesCAE allows supported resource providers and clients to respond to critical events and Conditional Access policy changes in near real time. Instead of relying only on a fixed token interval, a CAE-capable service can challenge a client to obtain a new token when the service becomes aware of an event that affects access.Microsoft documents critical events that can trigger this type of response, including:  A user account being deleted or disabled.  A password being changed or reset.  Multifactor authentication being enabled for a user.  An administrator explicitly revoking user sessions or refresh tokens.  Elevated user risk detected by Microsoft Entra ID Protection.Conditional Access location policy enforcement can also respond when the relevant network location changes, provided the application, client and policy combination supports CAE behavior.This does not mean every session everywhere is instantly disconnected. CAE depends on supported clients, resource providers, policy configuration and available signals. An architecture decision must account for that support boundary.Relationship to Conditional AccessConditional Access is the policy layer: it expresses conditions such as user, application, device, location or risk and specifies controls such as multifactor authentication or blocking access. CAE complements that policy layer by enabling faster reevaluation for supported scenarios while a session is active.For example, an organization may define trusted network locations for sensitive Microsoft 365 resources. If a CAE-capable session moves from a trusted network to an untrusted location, the resource can require the client to refresh access and apply the Conditional Access decision without waiting for a normal token expiry cycle.CAE is not a replacement for Conditional Access policy design. Poorly scoped policies, incomplete exclusions, missing emergency-access planning or unsupported applications remain architectural concerns regardless of CAE.Session Revocation ScenariosCAE is particularly relevant to security operations and identity lifecycle processes:Account DisablementWhen a user leaves the organization or an account is disabled during incident response, supported sessions can lose access more quickly. This reduces exposure compared with relying only on normal token expiry.Password Reset or Credential ConcernA password reset can be part of responding to suspected credential compromise. CAE helps make that action meaningful for supported cloud application sessions, but the response plan should also assess device security, authentication methods and any workload identities involved.Administrator RevocationAn administrator may revoke sessions when investigating risky sign-ins or when a user device is lost. This is an operational control that should be documented and tested by the identity and security operations teams.Location ChangeWith appropriate Conditional Access policies, changing from an allowed to a disallowed network location can lead to faster policy enforcement for CAE-capable applications. Network location definitions and named location governance therefore become part of identity architecture.Design and Verification ApproachThe original preview-era instruction to select an Enable preview option is no longer a suitable configuration tutorial. A current design approach is:  Identify applications and user groups where rapid enforcement is important, such as sensitive Microsoft 365 access or administrator workflows.  Review Microsoft’s current list of CAE-supported clients, resource providers and Conditional Access scenarios.  Confirm that Conditional Access policies express the intended controls and that emergency access accounts are appropriately protected.  Validate session revocation and location-change behavior with representative supported clients.  Monitor sign-in and audit information during testing and record expected operational response steps.  Include unsupported or legacy application behavior in residual-risk decisions.This validation should take place in a controlled tenant or pilot scope before it influences broad access policies.Client and Application Support ConsiderationsCAE is valuable precisely because applications participate in enforcement. That participation means client and resource support matters. Older clients, some protocols, custom applications or third-party applications may not behave in the same way as current supported Microsoft 365 applications.Architects should not describe the environment as protected by CAE merely because Microsoft Entra ID is in use. They should document:  Which resources and client types are expected to support CAE.  Which Conditional Access policies depend on location or other reevaluation signals.  How non-CAE-capable applications are controlled.  How security operations revoke sessions and validate the outcome.  What logs or investigations demonstrate that enforcement occurred.Where a business application requires rapid revocation but does not support suitable controls, that gap needs risk treatment rather than assumption.Identity Governance and Regulated EnvironmentsIn regulated or sovereign platform contexts, the ability to respond quickly to critical identity events contributes to operational assurance. An organization may need to demonstrate that privileged or sensitive access is governed, monitored and revoked through defined procedures.CAE should sit within a broader identity architecture that includes Microsoft Entra ID roles, Privileged Identity Management where appropriate, strong authentication, Conditional Access, identity lifecycle management, access reviews, logging and incident response. It is one control in a layered design.Limitations and Operational ConsiderationsCAE reduces response time for supported scenarios; it is not a guarantee of immediate enforcement across every application and connection. Network interruptions, unsupported clients, service behavior and policy scope can affect results. Teams should keep current with Microsoft documentation and re-test critical access scenarios after significant policy, client or application changes.SummaryContinuous Access Evaluation strengthens cloud access design by helping supported Microsoft Entra ID sessions react sooner to critical identity events and relevant Conditional Access changes. It addresses a gap that token lifetime alone cannot solve, but its value depends on supported applications, sound policy design and tested operational procedures.For enterprise Azure and Microsoft 365 architecture, CAE should be treated as part of a broader identity and security control model: strong authentication, least privilege, governed policy, visibility and dependable incident response.Further Reading  Continuous access evaluation in Microsoft Entra  Conditional Access documentation  Revoke user access in Microsoft Entra ID",
        "url": "//azure/identity/2021/06/05/ContinuosAccessEvaluation.html"
      }

      "microsoft-365-2021-06-04-universalprint-html": {
        "title": "Universal Print: Cloud Print Management for Microsoft 365 Environments",
        "tags": "Azure, Universal Print, Microsoft 365, Microsoft Entra ID, Intune",
        "date": "June 4, 2021",
        "author": "",
        "category": "",
        "content": "Universal Print provides cloud-managed printing for Microsoft 365 environments without requiring every user device to depend on a traditional print server.  Updated note (2026): This article has been expanded to reflect the current Universal Print service model and Microsoft Entra ID terminology. Verify licensing, supported clients and printer capabilities in Microsoft documentation before a production rollout.What Universal Print IsUniversal Print is Microsoft’s cloud print service for organizations using Microsoft 365. Printers are registered in the service, shared to entitled users or groups, and discovered from supported user devices through a familiar print experience. Users do not need to locate an on-premises print server or connect over VPN simply to submit a print job.The architectural benefit is not that printing disappears. Printing still needs ownership, physical devices, supplies, security controls and support. The benefit is that management moves away from a collection of Windows print servers and device-specific endpoint drivers toward a centrally governed cloud service with identity-based assignment.When It Makes SenseUniversal Print is a good candidate when an organization is adopting Microsoft Entra joined or hybrid joined devices, managing endpoints through Microsoft Intune, supporting remote or mobile workers, or delivering desktops through Azure Virtual Desktop (AVD). In those situations, relying on a traditional office-network print server can force users onto a VPN and make printer discovery dependent on network location.It is also useful when an enterprise wants a consistent printer inventory and assignment model. An organization can define ownership, location and permitted groups rather than allowing ad hoc queues to accumulate.Universal Print is not automatically the right replacement for every specialist printing workflow. Devices with finishing features, label production, high-volume batch output, offline requirements or application-specific driver dependencies need validation during a pilot.Architecture OverviewA typical Universal Print design contains four components:  Microsoft Entra ID identities and groups used to control access to shared printers.  Universal Print in Microsoft 365, where printers are registered, shared and monitored.  Printers that either connect directly to the service or use a connector.  User endpoints, potentially managed by Intune or provided through AVD, from which users discover or receive assigned printers.Print jobs are submitted through the cloud service. This supports users who are not on the office network, but it means internet connectivity and data-handling considerations should be assessed. Printing may contain commercially sensitive, personal or regulated information; it should be covered by the same information governance conversations as other document workflows.Printer OptionsUniversal Print-Ready PrintersUniversal Print-ready printers contain firmware or an approved capability that communicates directly with the service. This design removes the need for an intermediary Windows connector host. For new office deployments, native support can simplify operations because there is less server infrastructure to patch and monitor.Connector-Based PrintersExisting printers that do not connect directly to Universal Print can be exposed using the Universal Print connector. The connector is a Windows application installed on a machine that has direct access to the printers and remains available when users need to print. It registers printers, collects jobs from Universal Print and passes them to the target device.The connector is a sensible transition mechanism, especially where replacing functioning printer estates would be wasteful. However, it does not eliminate all local dependency: connector hosts need lifecycle management, monitoring, internet access and network connectivity to the printers. For resilient sites, architects should decide whether a failed connector is acceptable or whether connector capacity and recovery require a documented design.Identity and Access ModelPrinter assignment should be designed with Microsoft Entra ID groups, not individual manual grants. Groups can represent a site, floor, function or permitted use case, for example a controlled finance printer or a general shared printer in a regional office.A practical naming model includes country or site, building or floor, usage and device identity. Meaningful location fields make discovery usable for employees who do not already know queue names. Access groups should have owners and a review process, especially where printers handle sensitive material.Separate printer administration from general endpoint administration where operational responsibilities differ. The team managing physical devices may not need broad cloud platform rights, while service administrators should not need unrestricted access to unrelated Microsoft 365 services.Administrator Setup FlowThe exact portal screens evolve, but an enterprise setup normally follows this sequence:  Confirm service availability, licensing and supported client requirements using current Microsoft documentation.  Establish printer naming, location, ownership, support and access-group standards.  Register native Universal Print-ready devices, or deploy and configure a connector for existing printers.  Share registered printers and grant access to the appropriate Microsoft Entra ID groups.  Test discovery, installation, printing and support telemetry with a pilot population.  Deploy printers to managed users or devices where automatic provisioning is required.  Document operational ownership, incident handling and retirement of replaced queues or print servers.User ExperienceOn supported Windows devices, users can discover printers made available to them and print through the usual application workflow. For a user moving between offices or using a remote desktop, identity-based printer access can be much simpler than mapping an old print server share through a corporate network.For AVD, this can be particularly valuable where desktop access is delivered independently of the office network. The platform team should test printer discovery and document-printing performance from representative AVD sessions, while ensuring the access model does not expose location-specific or sensitive printers to users who do not require them.Intune Deployment ConsiderationsWhere users need a predictable default set of printers, Intune can deploy Universal Print printers through the settings catalog. Microsoft has deprecated older printer-provisioning tooling in favor of the current Intune policy approach. Automatic deployment should still be selective: assigning every printer to every user creates poor usability and weakens governance.Endpoint and workplace teams should align Intune assignments with the same Entra groups used for access, and test Windows versions, shared-device behavior and removal of obsolete queues. A migration should deliberately remove replaced print server mappings to avoid confusion and duplicate queues.Security and Governance ConsiderationsPrinting is a data path. The architecture should identify what information may be printed, who can access particular devices, how abandoned output is handled and whether secure-release or specialized partner features are needed. Access to a printer should follow least privilege and business need.Operational controls should include:  Named owners for printers, connector hosts and access groups.  Documented naming and location conventions.  Monitoring of printer registration, connector health, failed jobs and usage trends.  Patch and firmware processes for devices and connector machines.  A review of data protection and regulatory requirements for print jobs handled through a cloud service.  Controlled retirement of print servers and unused queues after migration.Limitations and Operational ConsiderationsUniversal Print depends on service connectivity. Connector-backed printers also depend on a functioning connector and local network reachability. Specialist device capabilities may need manufacturer support or an additional solution. Printing volume and license entitlements should be assessed against actual workload; verify current licensing and quotas in Microsoft documentation.A pilot should include ordinary documents, sensitive-output scenarios, remote users, AVD users if relevant, more than one office location and support troubleshooting. Monitoring is not merely a dashboard exercise: support staff need to determine whether a failure occurred at user access, cloud submission, connector processing or the physical printer.Enterprise Architecture TakeawaysUniversal Print can remove an unnecessary dependency on traditional print servers for cloud-oriented users, but its successful adoption depends on service design. Treat printer inventory, location metadata, group assignment, connector resilience and operational monitoring as platform concerns. That approach makes printing a governed capability available to workplace and product teams rather than an exception bound to a legacy network.SummaryUniversal Print is most useful when an enterprise already relies on Microsoft Entra ID, Microsoft 365, managed endpoints or Azure Virtual Desktop and wants centrally managed print access for users in different locations. Select native printers where practical, use connectors as a managed transition path, control access with groups and validate specialist needs before migration.Further Reading  Universal Print documentation  What is the Universal Print connector?  Create a Universal Print policy in Microsoft Intune",
        "url": "//microsoft 365/2021/06/04/UniversalPrint.html"
      }
