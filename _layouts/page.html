---
layout: default
---
<article class="page{% if page.feature-img %} feature-image{% endif %}">
  <header style="background-image: url('{{ site.baseurl }}/{{ page.feature-img }}')">
    <h1 class="title">{{ page.feature-title | default: page.title }}</h1>
    {% if page.subtitle %}<p class="subtitle">{{ page.subtitle }}</p>{% endif %}
  </header>
  <section class="post-content">{{ content }}</section>
  {% if page.show_author %}{% include author-bio.html %}{% endif %}
</article>
